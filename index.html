<!DOCTYPE html>
<html>
<head>
  <title>family request system</title>
</head>

<body>

<h2>family request</h2>

<input id="name" placeholder="nama kamu"><br>
<input id="item" placeholder="nama barang"><br>
<input id="price" placeholder="harga"><br>
<input id="time" placeholder="jam dibutuhkan"><br>

<button id="btn">kirim request</button>

<h2>list request</h2>
<ul id="list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDxI2pmlxDZNzR04cvAd8g3nfFdhBBC4Rg",
  authDomain: "family-request-3dd29.firebaseapp.com",
  projectId: "family-request-3dd29",
  storageBucket: "family-request-3dd29.firebasestorage.app",
  messagingSenderId: "912432447079",
  appId: "1:912432447079:web:6957682d59365ae8151ec2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("family system ready");

// AMBIL DATA
async function getRequests() {
  const querySnapshot = await getDocs(collection(db, "requests"));
  const list = document.getElementById("list");

  list.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const r = docSnap.data();

    const li = document.createElement("li");

    li.innerHTML = `
      <b>${r.name}</b> minta: ${r.item} - ${r.price} - ${r.time} <br>
      status: <b>${r.status}</b> <br>

      <button onclick="updateStatus('${docSnap.id}', 'bisa')">bisa</button>
      <button onclick="updateStatus('${docSnap.id}', 'gabisa')">gabisa</button>
      <button onclick="updateStatus('${docSnap.id}', 'selesai')">selesai</button>
      <hr>
    `;

    list.appendChild(li);
  });
}

// TAMBAH REQUEST
async function addRequest() {
  const name = document.getElementById("name").value;
  const item = document.getElementById("item").value;
  const price = document.getElementById("price").value;
  const time = document.getElementById("time").value;

  if (!name || !item) {
    alert("isi nama & barang dulu");
    return;
  }

  await addDoc(collection(db, "requests"), {
    name,
    item,
    price,
    time,
    status: "pending"
  });

  getRequests();
}

// UPDATE STATUS
window.updateStatus = async (id, newStatus) => {
  const ref = doc(db, "requests", id);

  await updateDoc(ref, {
    status: newStatus
  });

  getRequests();
};

// BUTTON
document.getElementById("btn").addEventListener("click", addRequest);

// LOAD AWAL
getRequests();
</script>

</body>
</html>
